<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0078D7;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .container {
            width: 80%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        button {
            background: #0078D7;
            color: white;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #005fa3;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Simple HTML + CSS + JavaScript Example</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Hello, World!</h2>

    <p>
        This is a sample HTML webpage demonstrating the basic layout of
        HTML, CSS, and JavaScript.
    </p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <p id="output"></p>
</div>

<footer>
    &copy; 2026 Sample Website | All Rights Reserved
</footer>

<script>
    function showMessage() {
        document.getElementById("output").innerHTML =
            "🎉 Congratulations! JavaScript is working successfully.";
    }
</script>


</body>
</html>
